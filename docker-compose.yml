services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ltx2
      POSTGRES_USER: ltx2
      POSTGRES_PASSWORD: ltx2
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ltx2 -d ltx2"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
